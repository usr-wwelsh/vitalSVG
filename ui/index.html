<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VitalSVG</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      padding: 2rem;
      max-width: 960px;
      margin: 0 auto;
    }

    header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid #21262d;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #f0f6fc;
    }

    header .subtitle {
      color: #8b949e;
      font-size: 0.85rem;
    }

    .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #58a6ff, #3fb950);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .empty {
      text-align: center;
      padding: 3rem;
      color: #8b949e;
    }

    .empty p { margin: 0.5rem 0; }

    .source-group {
      margin-bottom: 2rem;
    }

    .source-group h2 {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #8b949e;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .source-group h2 .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #3fb950;
    }

    .resource-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 1rem 1.25rem;
      margin-bottom: 0.75rem;
      transition: border-color 0.15s;
    }

    .resource-card:hover {
      border-color: #58a6ff;
    }

    .resource-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }

    .resource-name {
      font-size: 1.1rem;
      font-weight: 600;
      color: #f0f6fc;
    }

    .badges-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 0.75rem;
    }

    .badges-row img { height: 20px; }
    .badges-row img.sparkline { height: 30px; }

    .endpoints {
      display: none;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 0.75rem;
      margin-top: 0.5rem;
    }

    .endpoints.open { display: block; }

    .endpoint-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.35rem 0;
      font-size: 0.85rem;
    }

    .endpoint-row:not(:last-child) {
      border-bottom: 1px solid #21262d;
    }

    .endpoint-label {
      color: #8b949e;
      min-width: 70px;
      font-weight: 500;
    }

    .endpoint-url {
      font-family: 'SFMono-Regular', Consolas, monospace;
      color: #58a6ff;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 0.8rem;
    }

    .copy-btn {
      background: #21262d;
      border: 1px solid #30363d;
      color: #c9d1d9;
      padding: 2px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.75rem;
      white-space: nowrap;
      transition: background 0.15s;
    }

    .copy-btn:hover { background: #30363d; }
    .copy-btn.copied { background: #238636; border-color: #2ea043; color: #fff; }

    .toggle-btn {
      background: none;
      border: 1px solid #30363d;
      color: #8b949e;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.75rem;
      transition: all 0.15s;
    }

    .toggle-btn:hover { color: #c9d1d9; border-color: #58a6ff; }

    .copy-section {
      margin-top: 0.5rem;
      padding-top: 0.5rem;
      border-top: 1px solid #21262d;
    }

    .copy-section h4 {
      color: #8b949e;
      font-size: 0.75rem;
      font-weight: 500;
      margin-bottom: 0.35rem;
    }

    .markdown-snippet {
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 0.75rem;
      color: #7ee787;
      background: #161b22;
      padding: 0.5rem;
      border-radius: 4px;
      white-space: pre-wrap;
      word-break: break-all;
      position: relative;
    }

    .markdown-snippet .copy-btn {
      position: absolute;
      top: 4px;
      right: 4px;
    }

    .refresh-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      color: #8b949e;
      font-size: 0.8rem;
    }

    .refresh-btn {
      background: #21262d;
      border: 1px solid #30363d;
      color: #c9d1d9;
      padding: 4px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
    }

    .refresh-btn:hover { background: #30363d; }

    .master-badge-section {
      margin-bottom: 1rem;
      padding: 1rem 1.25rem;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
    }

    .master-badge-section .badge-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }

    .master-badge-section .badge-header h3 {
      font-size: 0.9rem;
      font-weight: 600;
      color: #f0f6fc;
    }

    .master-badge-section img {
      max-width: 100%;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">V</div>
    <div>
      <h1>VitalSVG</h1>
      <div class="subtitle">Live infrastructure badges for your README</div>
    </div>
  </header>

  <div class="refresh-bar">
    <span id="status">Loading...</span>
    <button class="refresh-btn" onclick="loadResources()">Refresh</button>
  </div>

  <div id="content"></div>

  <script>
    const BASE = window.location.origin;
    const BADGE_TYPES = ['status', 'cpu', 'ram', 'uptime'];

    async function loadResources() {
      const statusEl = document.getElementById('status');
      const contentEl = document.getElementById('content');

      try {
        const resp = await fetch(`${BASE}/api/resources`);
        const resources = await resp.json();

        if (!resources || resources.length === 0) {
          contentEl.innerHTML = `
            <div class="empty">
              <p>No resources found yet.</p>
              <p>Make sure Docker is running or Proxmox is configured, then wait for the first poll cycle (30s).</p>
            </div>`;
          statusEl.textContent = 'No resources found';
          return;
        }

        // Group by source
        const groups = {};
        for (const r of resources) {
          if (!groups[r.Source]) groups[r.Source] = [];
          groups[r.Source].push(r.Name);
        }

        let html = '';
        const sourceKeys = Object.keys(groups);
        if (sourceKeys.length > 1) {
          html += `
            <div class="master-badge-section" style="margin-bottom: 1.5rem;">
              <div class="badge-header">
                <h3>All Resources</h3>
                <div>
                  <button class="copy-btn" onclick="copyText(this, '${BASE}/badge/master.svg')">Copy URL</button>
                  <button class="copy-btn" onclick="copyText(this, '![overview](${BASE}/badge/master.svg)')">Copy MD</button>
                </div>
              </div>
              <img src="${BASE}/badge/master.svg" alt="master overview">
            </div>`;
        }
        for (const [source, names] of Object.entries(groups)) {
          html += `
            <div class="source-group">
              <h2><span class="dot"></span>${source}</h2>
              <div class="master-badge-section">
                <div class="badge-header">
                  <h3>Overview</h3>
                  <div>
                    <button class="copy-btn" onclick="copyText(this, '${BASE}/badge/${source}/master.svg')">Copy URL</button>
                    <button class="copy-btn" onclick="copyText(this, '![${source} overview](${BASE}/badge/${source}/master.svg)')">Copy MD</button>
                  </div>
                </div>
                <img src="${BASE}/badge/${source}/master.svg" alt="${source} master overview">
              </div>`;

          for (const name of names) {
            const id = `${source}-${name}`.replace(/[^a-zA-Z0-9-]/g, '_');
            html += `
              <div class="resource-card">
                <div class="resource-header">
                  <span class="resource-name">${name}</span>
                  <button class="toggle-btn" onclick="toggleEndpoints('${id}')">Copy URLs</button>
                </div>
                <div class="badges-row">`;

            for (const t of BADGE_TYPES) {
              html += `<img src="${BASE}/badge/${source}/${name}/${t}.svg" alt="${name} ${t}">`;
            }
            html += `
                  <img class="sparkline" src="${BASE}/badge/${source}/${name}/sparkline.svg?metric=cpu" alt="${name} cpu trend">
                  <img class="sparkline" src="${BASE}/badge/${source}/${name}/sparkline.svg?metric=ram" alt="${name} ram trend">
                </div>
                <div class="endpoints" id="ep-${id}">`;

            // Individual badge URLs
            for (const t of BADGE_TYPES) {
              const url = `${BASE}/badge/${source}/${name}/${t}.svg`;
              html += `
                  <div class="endpoint-row">
                    <span class="endpoint-label">${t}</span>
                    <span class="endpoint-url">${url}</span>
                    <button class="copy-btn" onclick="copyText(this, '${url}')">Copy URL</button>
                    <button class="copy-btn" onclick="copyText(this, '![${name} ${t}](${url})')">Copy MD</button>
                  </div>`;
            }

            // Sparkline URLs
            for (const metric of ['cpu', 'ram']) {
              const url = `${BASE}/badge/${source}/${name}/sparkline.svg?metric=${metric}`;
              html += `
                  <div class="endpoint-row">
                    <span class="endpoint-label">${metric} trend</span>
                    <span class="endpoint-url">${url}</span>
                    <button class="copy-btn" onclick="copyText(this, '${url}')">Copy URL</button>
                    <button class="copy-btn" onclick="copyText(this, '![${name} ${metric} trend](${url})')">Copy MD</button>
                  </div>`;
            }

            // Full markdown snippet
            const mdLines = BADGE_TYPES.map(t =>
              `![${name} ${t}](${BASE}/badge/${source}/${name}/${t}.svg)`
            ).join(' ');
            const mdAll = mdLines + `\n![${name} cpu trend](${BASE}/badge/${source}/${name}/sparkline.svg?metric=cpu) ![${name} ram trend](${BASE}/badge/${source}/${name}/sparkline.svg?metric=ram)`;

            html += `
                  <div class="copy-section">
                    <h4>All badges (Markdown)</h4>
                    <div class="markdown-snippet" id="md-${id}">${escapeHtml(mdAll)}<button class="copy-btn" onclick="copyText(this, document.getElementById('md-${id}').textContent.replace('Copy', '').trim())">Copy</button></div>
                  </div>
                </div>
              </div>`;
          }

          html += '</div>';
        }

        contentEl.innerHTML = html;
        const total = resources.length;
        statusEl.textContent = `${total} resource${total === 1 ? '' : 's'} discovered`;

      } catch (err) {
        contentEl.innerHTML = `
          <div class="empty">
            <p>Failed to connect to VitalSVG API.</p>
            <p>Make sure the server is running.</p>
          </div>`;
        statusEl.textContent = 'Connection error';
      }
    }

    function toggleEndpoints(id) {
      const el = document.getElementById('ep-' + id);
      el.classList.toggle('open');
    }

    function copyText(btn, text) {
      navigator.clipboard.writeText(text).then(() => {
        const orig = btn.textContent;
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = orig;
          btn.classList.remove('copied');
        }, 1500);
      });
    }

    function escapeHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    loadResources();
    // Auto-refresh every 60s
    setInterval(loadResources, 60000);
  </script>
</body>
</html>
