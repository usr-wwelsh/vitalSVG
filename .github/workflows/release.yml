name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o dist/vitalsvg-linux-amd64 .
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -o dist/vitalsvg-linux-arm64 .
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go build -o dist/vitalsvg-darwin-amd64 .
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build -o dist/vitalsvg-darwin-arm64 .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

